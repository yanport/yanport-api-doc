type: object
properties:
  lag:
    type: integer
    example: 1
    description: Nombre de périodes à soustraire pour obtenir la période de référence
  value:
    type: number
    format: double
    example: 50.25
    description: Différence entre la période actuelle et la période de référence
  percent:
    type: number
    format: double
    example: 2.75
    description: Différence en pourcentage entre la période actuelle et la période de référence (absent pour le type d'indicateur MARKET_STRESS)
  type:
    type: string
    enum:
      - INTERVAL
      - YEAR
      - CUMULATIVE
    example: INTERVAL
    description: Type de croissance (CUMULATIVE est absent pour le type d'indicateur MARKET_STRESS)
description: Croissance de l'indicateur
